<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>果蔬导航</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0f0f0f; --bg-card: #181818; --bg-card-hover: #202020;
            --border: #2a2a2a; --text-primary: #eaeaea; --text-secondary: #888888;
            --accent: #c4a96b; --accent-light: #dccba0;
        }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-dark); color: var(--text-primary);
            line-height: 1.6; min-height: 100vh; overflow-x: hidden;
        }
        .cursor-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(196, 169, 107, 0.06), transparent 40%);
            transition: background 0.1s ease;
        }
        .hero {
            position: relative; width: 100%; height: 480px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; filter: brightness(0.4); z-index: 0;
            transition: transform 0.3s ease-out;
        }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(15,15,15,0.3) 0%, rgba(15,15,15,0.85) 70%, var(--bg-dark) 100%);
            z-index: 1;
        }
        .hero-content {
            position: relative; z-index: 2; text-align: center; padding: 0 20px;
            transition: transform 0.3s ease-out;
        }
        .hero-title {
            font-family: 'Noto Serif SC', serif; font-size: 3.4rem; font-weight: 300;
            color: #fff; letter-spacing: 14px; margin-bottom: 16px;
            text-shadow: 0 2px 30px rgba(0,0,0,0.6);
        }
        .hero-line { width: 50px; height: 1px; background: var(--accent); margin: 0 auto 16px; opacity: 0.6; }
        .hero-subtitle { font-size: 0.9rem; color: var(--accent-light); font-weight: 300; letter-spacing: 8px; text-transform: uppercase; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; position: relative; z-index: 1; }
        .section-header { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 10px; margin-bottom: 6px; }
        .section-line { width: 40px; height: 1px; background: var(--border); }
        .section-label { font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 4px; text-transform: uppercase; }
        .filter-bar { display: flex; justify-content: center; gap: 10px; margin: 40px 0 42px; flex-wrap: wrap; }
        .filter-btn {
            padding: 9px 24px; border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); border-radius: 2px; cursor: pointer; font-size: 0.85rem;
            letter-spacing: 2px; transition: all 0.35s ease; font-family: 'Noto Sans SC', sans-serif;
            position: relative; overflow: hidden;
        }
        .filter-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(196, 169, 107, 0.1), transparent);
            transition: left 0.5s ease;
        }
        .filter-btn:hover::before { left: 100%; }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent-light); }
        .filter-btn.active { background: var(--accent); color: var(--bg-dark); border-color: var(--accent); font-weight: 500; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; perspective: 1000px; }
        .card {
            background: var(--bg-card); border-radius: 3px; overflow: hidden; cursor: pointer;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease, border-color 0.3s ease;
            border: 1px solid var(--border); position: relative; transform-style: preserve-3d; will-change: transform;
        }
        .card:hover { border-color: #3a3a3a; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 2; }
        .card:hover .card-img img { transform: scale(1.08); filter: brightness(0.85); }
        .card-img { width: 100%; height: 190px; overflow: hidden; position: relative; background: #222; display: flex; align-items: center; justify-content: center; }
        .card-img::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 45%;
            background: linear-gradient(to top, rgba(24,24,24,0.8) 0%, transparent 100%);
            z-index: 1; pointer-events: none;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: all 0.5s ease; display: block; position: absolute; top: 0; left: 0; }
        .card-img-fallback { width: 100%; height: 100%; display: none; align-items: center; justify-content: center; background: #222; font-size: 3.5rem; position: relative; z-index: 2; }
        .card-info { padding: 18px 18px 22px; }
        .card-name { font-family: 'Noto Serif SC', serif; font-size: 1.15rem; color: var(--text-primary); font-weight: 400; margin-bottom: 2px; letter-spacing: 1px; }
        .card-en { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; font-weight: 300; }
        .card-divider { width: 20px; height: 1px; background: var(--accent); margin: 10px 0; opacity: 0.5; transition: width 0.35s ease, opacity 0.35s ease; }
        .card:hover .card-divider { width: 40px; opacity: 0.9; }
        .card-tag { display: inline-block; padding: 3px 10px; background: rgba(196, 169, 107, 0.08); color: var(--accent); font-size: 0.7rem; border-radius: 1px; letter-spacing: 1px; border: 1px solid rgba(196, 169, 107, 0.15); }
        .hidden { display: none !important; }
        .loading-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; z-index: 3; transition: opacity 0.3s ease; }
        .loading-placeholder.loaded { opacity: 0; pointer-events: none; }
        .loading-spinner { width: 30px; height: 30px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(12px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.4s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-card); border-radius: 3px; max-width: 640px; width: 92%; max-height: 88vh; overflow-y: auto; position: relative; transform: translateY(40px) scale(0.96); transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); box-shadow: 0 30px 80px rgba(0,0,0,0.7); border: 1px solid var(--border); }
        .modal-overlay.active .modal { transform: translateY(0) scale(1); }
        .modal-header { position: relative; overflow: hidden; border-radius: 3px 3px 0 0; }
        .modal-img { width: 100%; height: 260px; overflow: hidden; position: relative; background: #222; }
        .modal-img::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 55%; background: linear-gradient(to top, rgba(24,24,24,0.95) 0%, transparent 100%); z-index: 1; }
        .modal-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .modal-img-fallback { width: 100%; height: 100%; display: none; align-items: center; justify-content: center; font-size: 5rem; }
        .modal-title-area { position: absolute; bottom: 0; left: 0; width: 100%; padding: 26px 30px; z-index: 2; }
        .modal-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.4); border-radius: 50%; cursor: pointer; font-size: 1.1rem; color: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; z-index: 10; backdrop-filter: blur(4px); }
        .modal-close:hover { background: rgba(0,0,0,0.6); color: #fff; border-color: rgba(255,255,255,0.25); transform: rotate(90deg); }
        .modal-title { font-family: 'Noto Serif SC', serif; font-size: 1.9rem; color: #fff; font-weight: 400; letter-spacing: 2px; margin-bottom: 2px; text-shadow: 0 1px 8px rgba(0,0,0,0.5); }
        .modal-en { color: var(--accent-light); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 300; }
        .modal-body { padding: 30px 32px 34px; }
        .info-section { margin-bottom: 28px; }
        .info-section:last-child { margin-bottom: 0; }
        .info-title { font-size: 0.72rem; color: var(--accent); font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; letter-spacing: 2px; text-transform: uppercase; font-family: 'Noto Sans SC', sans-serif; }
        .info-title::before { content: ''; display: inline-block; width: 14px; height: 1px; background: var(--accent); }
        .info-content { color: var(--text-secondary); font-size: 0.92rem; line-height: 1.9; padding-left: 22px; }
        .nutrition-tags { display: flex; flex-wrap: wrap; gap: 8px; padding-left: 22px; }
        .nutrition-tag { padding: 5px 14px; background: rgba(196, 169, 107, 0.06); color: var(--accent-light); border-radius: 1px; font-size: 0.82rem; border: 1px solid rgba(196, 169, 107, 0.12); letter-spacing: 1px; }
        .tip-box { background: rgba(196, 169, 107, 0.04); border-left: 2px solid var(--accent); padding: 14px 18px; border-radius: 0 2px 2px 0; font-size: 0.88rem; color: var(--text-secondary); line-height: 1.8; }
        footer { text-align: center; padding: 60px 20px 40px; position: relative; z-index: 1; }
        .footer-line { width: 30px; height: 1px; background: var(--accent); margin: 0 auto 16px; opacity: 0.4; }
        footer p { color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 3px; font-weight: 300; }
        @media (max-width: 600px) {
            .hero { height: 340px; } .hero-title { font-size: 2.4rem; letter-spacing: 8px; } .hero-subtitle { font-size: 0.78rem; letter-spacing: 4px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; } .card-img { height: 135px; }
            .card-info { padding: 14px 14px 18px; } .card-name { font-size: 1rem; } .modal-img { height: 200px; }
            .modal-body { padding: 22px 20px 26px; } .modal-title { font-size: 1.5rem; } .modal-title-area { padding: 18px 20px; }
            .info-content, .nutrition-tags, .tip-box { padding-left: 0; } .filter-btn { padding: 7px 16px; font-size: 0.8rem; }
            .cursor-glow { display: none; }
        }
    </style>
</head>

                <div class="card" data-category="${item.category}" data-id="${item.id}">
                    <div class="card-img" id="${cardId}">
                        <div class="loading-placeholder">
                            <div class="loading-spinner"></div>
                        </div>
                        <img src="${item.img}" alt="${item.name}" loading="lazy" data-card-id="${cardId}"
                             onload="document.getElementById('${cardId}').querySelector('.loading-placeholder').classList.add('loaded');"
                             onerror="handleImageError(this, '${item.name}', '${item.icon}', '${cardId}')">
                        <div class="card-img-fallback">${item.icon}</div>
                    </div>
                    <div class="card-info">
                        <div class="card-name">${item.name}</div>
                        <div class="card-en">${item.en}</div>
                        <div class="card-divider"></div>
                        <span class="card-tag">${getCategoryName(item.category)}</span>
                    </div>
                </div>
            `}).join('');

            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const item = produceData.find(p => p.id === id);
                    if (item) openModal(item);
                });
            });

            initCardTilt();
        }

        function handleImageError(img, name, icon, cardId) {
            const container = document.getElementById(cardId);
            container.querySelector('.loading-placeholder').classList.add('loaded');
            img.style.display = 'none';
            container.querySelector('.card-img-fallback').style.display = 'flex';
        }

        function getCategoryName(cat) {
            const map = { fruit: '水果', vegetable: '蔬菜', berry: '浆果', citrus: '柑橘', leaf: '叶菜' };
            return map[cat] || cat;
        }

        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const modalImg = document.getElementById('modalImg');
        const modalIconFallback = document.getElementById('modalIconFallback');

        function openModal(item) {
            modalImg.src = item.img;
            modalImg.alt = item.name;
            modalImg.style.display = 'block';
            modalImg.parentElement.querySelector('.modal-img-fallback').style.display = 'none';
            modalIconFallback.textContent = item.icon;

            document.getElementById('modalTitle').textContent = item.name;
            document.getElementById('modalEn').textContent = item.en;

            document.getElementById('modalBody').innerHTML = `
                <div class="info-section">
                    <div class="info-title">简介</div>
                    <div class="info-content">${item.desc}</div>
                </div>
                <div class="info-section">
                    <div class="info-title">主要营养</div>
                    <div class="nutrition-tags">
                        ${item.nutrition.map(n => `<span class="nutrition-tag">${n}</span>`).join('')}
                    </div>
                </div>
                <div class="info-section">
                    <div class="info-title">健康功效</div>
                    <div class="info-content">${item.benefit}</div>
                </div>
                <div class="info-section">
                    <div class="info-title">挑选技巧</div>
                    <div class="tip-box">${item.tip}</div>
                </div>
            `;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.dataset.filter;
                document.querySelectorAll('.card').forEach(card => {
                    if (filter === 'all' || card.dataset.category === filter) {
                        card.classList.remove('hidden');
                    } else {
                        card.classList.add('hidden');
                    }
                });
            });
        });

        const cursorGlow = document.getElementById('cursorGlow');
        let mouseX = 50, mouseY = 50;
        let targetX = 50, targetY = 50;

        document.addEventListener('mousemove', (e) => {
            targetX = (e.clientX / window.innerWidth) * 100;
            targetY = (e.clientY / window.innerHeight) * 100;
        });

        function animateCursorGlow() {
            mouseX += (targetX - mouseX) * 0.08;
            mouseY += (targetY - mouseY) * 0.08;
            cursorGlow.style.setProperty('--mouse-x', mouseX + '%');
            cursorGlow.style.setProperty('--mouse-y', mouseY + '%');
            requestAnimationFrame(animateCursorGlow);
        }
        animateCursorGlow();

        const heroBg = document.getElementById('heroBg');
        const heroContent = document.getElementById('heroContent');

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            heroBg.style.transform = `translate(${-x * 12}px, ${-y * 8}px) scale(1.05)`;
            heroContent.style.transform = `translate(${x * 8}px, ${y * 5}px)`;
        });

        function initCardTilt() {
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -8;
                    const rotateY = ((x - centerX) / centerX) * 8;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px) translateY(-4px)`;
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateZ(0) translateY(0)';
                    card.style.transition = 'transform 0.4s ease-out';
                    setTimeout(() => {
                        card.style.transition = 'transform 0.1s ease-out, box-shadow 0.3s ease, border-color 0.3s ease';
                    }, 400);
                });
            });
        }

        renderCards();
    </script>
</body>
</html>
